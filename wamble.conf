;; Default configuration
(def port 8888)
(def websocket-enabled 0)
(def websocket-port 0)
(def websocket-path "/ws")
(def timeout-ms 100)
(def max-retries 3)
(def max-message-size 126)
(def buffer-size 65536)
(def terminal-cache-ttl-ms 2000)
(def session-timeout 300)
(def max-boards 1024)
(def min-boards 4)
(def inactivity-timeout 300)
(def reservation-timeout 2)
(def k-factor 32)
(def default-rating 1200)
(def max-players 1024)
(def token-expiration 86400)
(def max-pot 20.0)
(def max-moves-per-board 1000)
(def max-contributors 100)
(def db-host "localhost")
(def db-user "wamble")
(def db-pass "wamble")
(def db-name "wamble")
(def select-timeout-usec 100000)
(def cleanup-interval-sec 60)
(def max-token-attempts 1000)
(def max-token-local-attempts 100)
(def db-log-frequency 1000)
(def log-level 3) ;; 0=FATAL,1=ERROR,2=WARN,3=INFO,4=DEBUG

;; Helper for computed values
(defn port-for (base offset) (+ base offset))

;; Base profile to inherit from (config template only, never instantiated)
(defprofile base
  ((def abstract 1)
   (def advertise 0)
   (def visibility 0)
   (def db-host "localhost")
   (def db-user "wamble")
   (def db-pass "wamble")
   (def db-name "wamble")
   (def log-level 3)))

;; Two advertised profiles on unique ports sharing the same DB config
(defprofile canary :inherits base
  ((def port (port-for 8800 91))
   (def advertise 1)
   (def visibility 1)
   (def log-level 4)))      ;; DEBUG for this profile

;; Inheritance using list form of :inherits
(defprofile blue
  ((:inherits base ((def port (port-for 8800 92))
                    (def advertise 1)
                    (def visibility 2)
                    (def log-level 2)
                    (def tos-text "Terms of Service\n\nBy entering this server you agree to the following terms.\n\n1. Fair Play. You will play without automated assistance, bots, or exploits.\n\n2. Session Credentials. You are responsible for your persistent identity key. Do not share it.\n\n3. Service Availability. This server is provided as-is with no guarantees of uptime, continuity, or data preservation.\n\n4. Data. Move history, scores, and game results are stored and may be used for statistical analysis.\n\n5. Enforcement. We reserve the right to terminate or restrict any session or identity for violations of these terms.")))))

;; Non-advertised test profile (separate DB allowed since it's hidden)
(defprofile test
  ((def port 8890)
   (def db-name "wamble_test")
   (def advertise 0)        ;; hidden from normal clients
   (def visibility 100)     ;; high trust level
   (def log-level 4)))
